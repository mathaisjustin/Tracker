name: Deploy Backend

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Starting deployment..."

            cd ~/Tracker

            # 🔥 HARD RESET (no stale code ever again)
            git fetch origin
            git reset --hard origin/master

            cd apps/backend

            # 🔥 Clean old build
            rm -rf dist

            npm install
            npm run build

            # 🔥 Restart properly
            pm2 restart backend

            echo "Deployment complete!"